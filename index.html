<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF6E9" />
  <title>Правда или Действие</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="blobs" aria-hidden="true">
    <span class="blob blob--1"></span>
    <span class="blob blob--2"></span>
    <span class="blob blob--3"></span>
    <span class="blob blob--4"></span>
    <span class="blob blob--5"></span>
  </div>

  <div class="confetti" aria-hidden="true">
    <svg class="conf conf--star" viewBox="0 0 20 20" style="top:8%;left:12%;animation-delay:-2s">
      <path d="M10 1 L12 8 L19 9 L13 13 L15 19 L10 15 L5 19 L7 13 L1 9 L8 8 Z" fill="#FFD66B" stroke="#2D1B3D" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <svg class="conf conf--flower" viewBox="0 0 24 24" style="top:18%;right:8%;animation-delay:-5s">
      <circle cx="12" cy="6"  r="4" fill="#FFB0B6" stroke="#2D1B3D" stroke-width="1.5"/>
      <circle cx="18" cy="12" r="4" fill="#FFB0B6" stroke="#2D1B3D" stroke-width="1.5"/>
      <circle cx="12" cy="18" r="4" fill="#FFB0B6" stroke="#2D1B3D" stroke-width="1.5"/>
      <circle cx="6"  cy="12" r="4" fill="#FFB0B6" stroke="#2D1B3D" stroke-width="1.5"/>
      <circle cx="12" cy="12" r="3" fill="#FFD66B" stroke="#2D1B3D" stroke-width="1.5"/>
    </svg>
    <svg class="conf conf--cloud" viewBox="0 0 30 18" style="bottom:18%;left:6%;animation-delay:-9s">
      <path d="M6 14 C 2 14, 2 8, 6 8 C 6 4, 14 4, 14 8 C 16 5, 24 6, 24 11 C 28 11, 28 14, 24 14 Z" fill="#C8DFFF" stroke="#2D1B3D" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <svg class="conf conf--leaf" viewBox="0 0 20 20" style="bottom:10%;right:14%;animation-delay:-12s">
      <path d="M3 17 C 3 7, 10 3, 17 3 C 17 10, 13 17, 3 17 Z" fill="#BFEFD7" stroke="#2D1B3D" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M3 17 L 14 6" stroke="#2D1B3D" stroke-width="1.2" fill="none"/>
    </svg>
  </div>

  <main id="app">

    <!-- ─── ИНТРО ─── -->
    <section class="view view--intro" id="view-intro">
      <header class="hero">
        <span class="hero__badge">игра для двоих</span>
        <h1 class="title">
          <span class="title__big">Правда</span>
          <span class="title__or">или</span>
          <span class="title__big title__big--alt">Действие</span>
        </h1>
        <p class="tagline">Выбери уровень — и вытяни карту&nbsp;<span class="tagline__dot">·</span> карта за картой</p>
      </header>

      <div class="levels">
        <button class="level level--1" data-level="I" aria-label="Лёгкий, 16+">
          <span class="level__icon">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <path d="M32 58 V34" stroke="#2D1B3D" stroke-width="3" stroke-linecap="round" fill="none"/>
              <path d="M32 38 C 28 30, 18 26, 10 30 C 14 40, 24 42, 32 38 Z" fill="#5FBA94" stroke="#2D1B3D" stroke-width="2.5" stroke-linejoin="round"/>
              <path d="M32 32 C 36 22, 46 18, 54 22 C 50 32, 40 36, 32 32 Z" fill="#9EE5C6" stroke="#2D1B3D" stroke-width="2.5" stroke-linejoin="round"/>
              <ellipse cx="32" cy="60" rx="14" ry="2" fill="#2D1B3D" opacity="0.15"/>
            </svg>
          </span>
          <span class="level__age">16+</span>
          <span class="level__name">Лёгкий</span>
          <span class="level__desc">для разогрева</span>
        </button>

        <button class="level level--2" data-level="II" aria-label="Тёплый, 18+">
          <span class="level__icon">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <circle cx="32" cy="32" r="14" fill="#FFD66B" stroke="#2D1B3D" stroke-width="2.5"/>
              <path d="M32 6 V12 M32 52 V58 M6 32 H12 M52 32 H58 M13 13 L18 18 M46 46 L51 51 M51 13 L46 18 M18 46 L13 51" stroke="#2D1B3D" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="27" cy="30" r="1.6" fill="#2D1B3D"/>
              <circle cx="37" cy="30" r="1.6" fill="#2D1B3D"/>
              <path d="M26 36 Q 32 41 38 36" stroke="#2D1B3D" stroke-width="2" fill="none" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="level__age">18+</span>
          <span class="level__name">Тёплый</span>
          <span class="level__desc">с искрой</span>
        </button>

        <button class="level level--3" data-level="III" aria-label="Жаркий, 21+">
          <span class="level__icon">
            <svg viewBox="0 0 64 64" aria-hidden="true">
              <path d="M24 14 C 26 12, 30 12, 32 14 C 34 12, 38 12, 40 14" stroke="#5FBA94" stroke-width="3" stroke-linecap="round" fill="none"/>
              <path d="M32 12 V20" stroke="#5FBA94" stroke-width="3" stroke-linecap="round"/>
              <path d="M30 18 C 28 24, 26 32, 30 42 C 34 52, 46 54, 50 46 C 52 40, 44 34, 38 28 C 34 22, 30 18, 30 18 Z" fill="#EE7783" stroke="#2D1B3D" stroke-width="2.5" stroke-linejoin="round"/>
              <path d="M35 30 C 37 34, 40 38, 42 40" stroke="#FFAAA5" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
            </svg>
          </span>
          <span class="level__age">21+</span>
          <span class="level__name">Жаркий</span>
          <span class="level__desc">без тормозов</span>
        </button>
      </div>
    </section>

    <!-- ─── ИГРА ─── -->
    <section class="view view--play" id="view-play" hidden>
      <header class="play-head">
        <button class="iconbtn" id="btn-back" aria-label="Назад">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M15 4 L7 12 L15 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Назад</span>
        </button>

        <div class="chip" id="level-chip">
          <span class="chip__age" id="level-age">16+</span>
          <span class="chip__name" id="level-name">Лёгкий</span>
        </div>

        <div class="counter">
          <span id="counter-now">0</span>
          <span class="counter__sep">/</span>
          <span id="counter-tot">0</span>
        </div>
      </header>

      <nav class="modes" role="tablist" aria-label="Режим">
        <button class="mode is-active" data-mode="truth" role="tab" aria-selected="true">Правда</button>
        <button class="mode" data-mode="mixed" role="tab" aria-selected="false">Микс</button>
        <button class="mode" data-mode="dare" role="tab" aria-selected="false">Действие</button>
      </nav>

      <div class="stage">
        <article class="card" id="card" data-lvl="I" aria-live="polite">
          <div class="card__inner" id="card-inner">
            <span class="card__sparkle card__sparkle--tl">
              <svg viewBox="0 0 24 24"><path d="M12 2 L13.5 10.5 L22 12 L13.5 13.5 L12 22 L10.5 13.5 L2 12 L10.5 10.5 Z" fill="currentColor"/></svg>
            </span>
            <span class="card__sparkle card__sparkle--br">
              <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill="currentColor"/></svg>
            </span>

            <div class="card__head">
              <span class="card__no" id="card-no">№ 0</span>
              <span class="card__type" id="card-type" data-type="truth">Правда</span>
            </div>

            <p class="card__text" id="card-text">Нажмите «Вытянуть», чтобы начать.</p>
          </div>
        </article>
      </div>

      <div class="actions">
        <button class="btn btn--ghost" id="btn-skip">Пропустить</button>
        <button class="btn btn--primary" id="btn-draw">
          Вытянуть
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path d="M5 12 L19 12 M13 6 L19 12 L13 18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <p class="hint">Можно играть по очереди — пробел или клик по карте → следующая</p>
    </section>

    <!-- ─── ФИНАЛ ─── -->
    <section class="view view--end" id="view-end" hidden>
      <div class="end-card">
        <span class="end-emoji">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <path d="M40 8 L46 30 L70 32 L52 46 L58 70 L40 58 L22 70 L28 46 L10 32 L34 30 Z"
              fill="#FFD66B" stroke="#2D1B3D" stroke-width="3" stroke-linejoin="round"/>
          </svg>
        </span>
        <h2 class="end-title">Карты закончились!</h2>
        <p class="end-sub">Вы прошли всю колоду этого уровня.</p>
        <div class="end-actions">
          <button class="btn btn--primary" id="btn-restart">
            Начать заново
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path d="M4 12 A8 8 0 1 1 12 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
              <path d="M4 6 L4 12 L10 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="btn btn--ghost" id="btn-change-level">Другой уровень</button>
        </div>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
